<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CTRL + SHIFT</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#07070c;color:#00ff41;font-family:'Share Tech Mono',monospace;}
#game{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px;}
#story{max-width:900px;margin-bottom:20px;min-height:140px;line-height:1.6;}
button{padding:10px;margin:6px;border:2px solid #00ff41;background:transparent;color:#00ff41;width:720px;max-width:95%;cursor:pointer;text-align:left;}
button:hover{background:#00ff41;color:black;}
input{padding:8px;border:2px solid #00ff41;background:black;color:#00ff41;margin:10px;}
#hud{position:absolute;top:15px;left:15px;font-size:13px;line-height:1.5;}
h1{font-family:'Press Start 2P';font-size:18px;}
</style>
</head>
<body>

<div id="hud"></div>

<div id="game">
<h1>CTRL + SHIFT</h1>
<div id="story"></div>
<div id="choices"></div>
</div>

<script>

/* ================= STATE ================= */

let company="", industry="", product="";
let cash=100, market=15, share=100;
let qIndex=0;
let currentSet=[];

const story=document.getElementById("story");
const choices=document.getElementById("choices");
const hud=document.getElementById("hud");

/* ================= INDUSTRY + PRODUCT CONTEXT ================= */

const data = {

"Nostalgia Trap":{
desc:"Real life has become sterile and hyper-digitized. The past is now the most expensive commodity.",
products:{
"Scent-Memory Candles":"Candles that release curated 90s-era scent notes and embedded vinyl audio nostalgia.",
"Retro-Lens Contacts":"Wearable lenses that filter reality into grainy 35mm emotional cinema.",
"First-Love Chewing Gum":"Biochemical gum that recreates the hormonal rush of teenage butterflies.",
"Analog Dead Zones":"Signal-free physical spaces where people pay to disconnect."
}
},

"Weather Paywall":{
desc:"Climate collapse has privatized nature. Breeze, sunlight and snow are subscription experiences.",
products:{
"Pocket-Sun Flashlights":"Portable devices that emit calibrated Vitamin D sunlight.",
"Subscription Rain-Clouds":"On-demand atmospheric systems for private rainfall.",
"Snow-in-a-Can":"Compressed aesthetic snowfall for events and luxury experiences.",
"Wind-Chill Scarves":"Wearable thermoregulators that maintain a perfect 20°C."
}
},

"Flavor Debt":{
desc:"Natural food has lost flavor. Taste is now digitally engineered.",
products:{
"Electric Truffle Spoons":"Utensils that electrically simulate premium flavors.",
"Flavor-Sync Apps":"Apps that overlay taste sensations onto water and neutral foods.",
"Sizzling-Audio Headphones":"Audio tech that tricks the brain into perceiving crunch.",
"Last Burger NFT":"A blockchain key granting symbolic ownership of the last real cow."
}
},

"Nightmare Insurance":{
desc:"Dreams are neural-linked and vulnerable to advertising hacks.",
products:{
"Firewall Pillows":"Signal-blocking sleep hardware.",
"Dream-Security AI":"AI that intercepts subconscious ad intrusions.",
"Nightmare-to-Comedy Converter":"Dream modulation software turning fear into levity.",
"Sleep-State Encryption Keys":"Biometric locks securing dream access."
}
}

};

/* ================= HUD ================= */

function updateHUD(){
hud.innerHTML=`
CEO: ${company}<br>
Industry: ${industry}<br>
Product: ${product}<br><br>
Cash: $${cash}M<br>
Market Share: ${market}%<br>
Share Price: ${share}
`;
}

/* ================= LOGIN ================= */

function start(){
story.innerHTML="Enter your company name to begin.";
choices.innerHTML="";
let input=document.createElement("input");
let btn=document.createElement("button");
btn.textContent="Initialize";
btn.onclick=()=>{
company=input.value||"Unnamed Corp";
chooseIndustry();
};
choices.appendChild(input);
choices.appendChild(btn);
}
start();

/* ================= INDUSTRY SELECTION ================= */

function chooseIndustry(){
story.innerHTML="Select Industry";
choices.innerHTML="";
Object.keys(data).forEach(i=>{
let b=document.createElement("button");
b.innerHTML=`<strong>${i}</strong><br>${data[i].desc}`;
b.onclick=()=>{industry=i; chooseProduct();};
choices.appendChild(b);
});
}

/* ================= PRODUCT SELECTION ================= */

function chooseProduct(){
story.innerHTML=`${data[industry].desc}<br><br>Select Product`;
choices.innerHTML="";
Object.keys(data[industry].products).forEach(p=>{
let b=document.createElement("button");
b.innerHTML=`<strong>${p}</strong><br>${data[industry].products[p]}`;
b.onclick=()=>{product=p; beginSimulation();};
choices.appendChild(b);
});
}

/* ================= QUESTION GENERATOR ================= */

function beginSimulation(){
cash=100; market=15; share=100; qIndex=0;
generateQuestions();
updateHUD();
nextQuestion();
}

function generateQuestions(){

function opt(t,c,m,s,con){return{t,c,m,s,con};}

currentSet=[

{
context:`${company} launches its ${product} in the ${industry} sector. Early adopters are intrigued, but demand is unpredictable.`,
question:"How do you manage initial growth?",
options:[
opt("Increase pricing to test willingness to pay",20,-2,15,"Margins improve, but adoption slows slightly."),
opt("Scale production aggressively",-25,12,8,"Growth accelerates, but cash reserves thin."),
opt("Launch limited edition batch",10,6,12,"Exclusivity strengthens brand perception."),
opt("License technology early",25,8,-5,"Cash rises quickly, though long-term control weakens.")
]
},

{
context:`Media scrutiny rises around the societal implications of ${product}. Analysts debate ethics versus innovation.`,
question:"What is your strategic communication move?",
options:[
opt("Publish transparent impact study",-15,8,18,"Credibility improves and investor trust strengthens."),
opt("Reposition messaging toward lifestyle benefits",-10,6,8,"Consumer sentiment stabilizes modestly."),
opt("Lobby regulators quietly",-20,3,10,"Short-term protection boosts stability but raises governance concerns."),
opt("Ignore and focus on revenue",5,-8,-12,"Share price dips as uncertainty grows.")
]
},

{
context:`A competitor undercuts pricing with a simplified version of ${product}.`,
question:"Your competitive response?",
options:[
opt("Differentiate with premium positioning",-10,8,20,"Brand equity increases valuation resilience."),
opt("Engage in price war",-30,15,-8,"Market share rises but margins erode."),
opt("Acquire competitor",-40,20,18,"Dominance grows though balance sheet risk rises."),
opt("Focus on niche segment",5,-3,10,"Profitability steadies but expansion slows.")
]
},

{
context:`Internal leadership questions whether growth is sustainable given current infrastructure.`,
question:"What operational decision do you take?",
options:[
opt("Invest in backend systems",-30,10,18,"Stability reassures institutional investors."),
opt("Delay upgrades to preserve cash",10,-5,-6,"Liquidity improves but operational risk grows."),
opt("Hire experienced executive",-20,8,15,"Strategic depth strengthens long-term outlook."),
opt("Push teams harder for output",5,-8,-12,"Short-term performance strains morale.")
]
},

{
context:`Market sentiment shifts across the ${industry}. Capital markets are watching your next move carefully.`,
question:"Final strategic pivot?",
options:[
opt("Diversify into adjacent category",-25,12,20,"Expansion narrative excites long-term investors."),
opt("Double down on core product",10,-2,12,"Focus improves profitability discipline."),
opt("Seek strategic merger",-35,18,22,"Scale advantage lifts valuation despite integration risk."),
opt("Optimize margins and hold steady",15,-3,10,"Efficiency improves but growth moderates.")
]
}

];

}

/* ================= GAME LOOP ================= */

function nextQuestion(){

if(qIndex>=currentSet.length){
return finalReport();
}

let q=currentSet[qIndex];
story.innerHTML=`${q.context}<br><br><strong>${q.question}</strong>`;
choices.innerHTML="";

q.options.forEach(o=>{
let b=document.createElement("button");
b.textContent=o.t;
b.onclick=()=>{
cash+=o.c;
market+=o.m;
share+=o.s;

story.innerHTML=`${o.con}`;
choices.innerHTML="";
let next=document.createElement("button");
next.textContent="Continue";
next.onclick=()=>{
qIndex++;
updateHUD();
nextQuestion();
};
choices.appendChild(next);
updateHUD();
};
choices.appendChild(b);
});
}

/* ================= FINAL REPORT ================= */

function finalReport(){

let narrative="";
if(market>40 && share>150){
narrative="You have emerged as a defining force in this dystopian economy, blending disciplined strategy with bold execution.";
}
else if(cash<60){
narrative="Aggressive expansion constrained liquidity, limiting your strategic flexibility.";
}
else{
narrative="You survive as a calculated operator — not dominant, but resilient in volatility.";
}

story.innerHTML=`
Final Report<br><br>
Over five strategic inflection points, ${company} navigated the ${industry} landscape with its ${product}. 
It now commands ${market}% market share, holds $${cash}M in capital, and trades at ${share}. 
${narrative}
`;

choices.innerHTML="";
let restart=document.createElement("button");
restart.textContent="Restart Simulation";
restart.onclick=()=>location.reload();
choices.appendChild(restart);
updateHUD();
}

</script>
</body>
</html>
